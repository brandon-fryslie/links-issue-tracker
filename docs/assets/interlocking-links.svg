<svg width="960" height="360" viewBox="0 0 960 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated interlocking links badge</title>
  <desc id="desc">Two interlocking chain links in cyan and green on a rounded square badge with subtle motion.</desc>
  <!-- [LAW:one-source-of-truth] README artwork is centralized in this single SVG file. -->
  <defs>
    <linearGradient id="cardFill" x1="330" y1="30" x2="630" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>

    <linearGradient id="blueLink" x1="292" y1="98" x2="538" y2="274" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.52" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0284C7"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-18 0;18 0;-18 0" dur="5.4s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="greenLink" x1="420" y1="96" x2="666" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7B7"/>
      <stop offset="0.56" stop-color="#34D399"/>
      <stop offset="1" stop-color="#059669"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="18 0;-18 0;18 0" dur="5.4s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="badgeShadow" x="290" y="4" width="380" height="352" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#020617" flood-opacity="0.24"/>
    </filter>

    <filter id="linkShadow" x="230" y="48" width="500" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.22"/>
    </filter>

    <clipPath id="leftOnTopClip">
      <rect x="438" y="130" width="86" height="66" rx="28" transform="rotate(-38 481 163)"/>
    </clipPath>

    <clipPath id="rightOnTopClip">
      <rect x="468" y="170" width="86" height="66" rx="28" transform="rotate(-38 511 203)"/>
    </clipPath>
  </defs>

  <g filter="url(#badgeShadow)">
    <rect x="330" y="30" width="300" height="300" rx="24" fill="url(#cardFill)"/>
  </g>

  <g filter="url(#linkShadow)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -2;0 0" dur="3.8s" repeatCount="indefinite"/>

      <rect x="292" y="122" width="250" height="116" rx="58" transform="rotate(-38 417 180)" stroke="url(#blueLink)" stroke-width="36"/>
      <rect x="420" y="122" width="250" height="116" rx="58" transform="rotate(-38 545 180)" stroke="url(#greenLink)" stroke-width="36"/>

      <g clip-path="url(#leftOnTopClip)">
        <rect x="292" y="122" width="250" height="116" rx="58" transform="rotate(-38 417 180)" stroke="url(#blueLink)" stroke-width="36"/>
      </g>

      <g clip-path="url(#rightOnTopClip)">
        <rect x="420" y="122" width="250" height="116" rx="58" transform="rotate(-38 545 180)" stroke="url(#greenLink)" stroke-width="36"/>
      </g>

      <rect x="292" y="122" width="250" height="116" rx="58" transform="rotate(-38 417 180)" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="9"/>
      <rect x="420" y="122" width="250" height="116" rx="58" transform="rotate(-38 545 180)" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="9"/>
    </g>
  </g>
</svg>
