# goreleaser config for lit.
#
# [LAW:one-source-of-truth] The version/commit/date a release reports come from
# a single place: the ldflags injected here. internal/version.{Version,Commit,Date}
# are the only sinks; no other code computes those fields.
#
# [LAW:single-enforcer] Exactly one workflow (.github/workflows/release.yml)
# invokes this config — on a `v*.*.*` tag push. Local `goreleaser release
# --snapshot` is a dry-run convenience; it does NOT publish anything.

version: 2

project_name: lit

before:
  hooks:
    - go mod tidy

builds:
  - id: lit
    main: ./cmd/lit
    binary: lit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64: Dolt's MySQL driver path is exercised on amd64; skip
      # arm64-windows until there is a real consumer to justify the test matrix.
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X github.com/bmf/links-issue-tracker/internal/version.Version={{ .Version }}
      - -X github.com/bmf/links-issue-tracker/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/bmf/links-issue-tracker/internal/version.Date={{ .Date }}

archives:
  - id: lit
    # name_template MUST match tools/mkmanifest's platformFromFilename parser:
    # `lit_<version>_<goos>_<goarch>.<ext>` (underscore-separated). If this
    # template changes, that parser changes in the same PR.
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README*

checksum:
  # Default name: checksums.txt. mkmanifest reads this exact file.
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  # Local --snapshot invocation gets a clearly-non-release version so a
  # snapshot can never be confused with a tagged release in flight.
  version_template: "{{ incpatch .Version }}-snapshot+{{.ShortCommit}}"

# After goreleaser writes the archives + checksums.txt, run mkmanifest to
# emit release-manifest.json into dist/, then upload it as an extra release
# asset alongside the archives.
#
# `extra_files` is a release-level upload list; the manifest joins the
# artifacts that GitHub Releases will publish.
release:
  extra_files:
    - glob: ./dist/release-manifest.json
  draft: false
  prerelease: auto

after:
  hooks:
    - cmd: >
        go run ./tools/mkmanifest
        -version {{ .Version }}
        -commit {{ .ShortCommit }}
        -date {{ .Date }}
        -dist ./dist
        -base-url https://github.com/brandon-fryslie/links-issue-tracker/releases/download
        -out ./dist/release-manifest.json

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
