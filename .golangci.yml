version: "2"

linters:
  default: none
  enable:
    - depguard
  settings:
    depguard:
      rules:
        # [LAW:single-enforcer] lifecycle internals are enforced at the model package boundary instead of by caller convention.
        lifecycle-boundary:
          files:
            - "cmd/lit/*.go"
            - "cmd/lnks/*.go"
            - "internal/annotation/*.go"
            - "internal/app/*.go"
            - "internal/backup/*.go"
            - "internal/cli/*.go"
            - "internal/config/*.go"
            - "internal/doltcli/*.go"
            - "internal/issueid/*.go"
            - "internal/legacydolt/*.go"
            - "internal/merge/*.go"
            - "internal/query/*.go"
            - "internal/rank/*.go"
            - "internal/store/*.go"
            - "internal/syncfile/*.go"
            - "internal/templates/*.go"
            - "internal/workspace/*.go"
          deny:
            - pkg: "github.com/bmf/links-issue-tracker/internal/model/lifecycle"
              desc: "lifecycle internals are owned by internal/model; use model hydration and capability APIs"
